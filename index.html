<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.page{
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.text-container{
margin:50px 50px 0 50px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

h1{
font-size:60pt;
font-weight:400;
margin:0;
line-height:1.1;
}

a{
font-style:italic;
color:inherit;
text-decoration:none;
}

.image-container{
width:100%;
flex-grow:1;
display:flex;
align-items:flex-end;
}

.image-container img{
width:100%;
height:auto;
object-fit:cover;
display:block;
}

@media (max-width:700px){

.text-container{
display:flex;
flex-direction:column;
height:100%;
}

.text-container h1:first-child{
margin-bottom:auto;
}

.text-container h1:last-child{
margin-top:auto;
}

.image-container img{
height:35vh;
object-fit:cover;
}

}

</style>
</head>

<body>

<div class="page">

<div class="text-container">

<h1>
Under Construction!
</h1>

<h1>
Stay in Touch:<br><br>
<a href="mailto:info@amfibian.xyz">info@amfibian.xyz</a><br>
<a href="https://instagram.com/amfibian.fonts">@amfibian.fonts</a>
</h1>

</div>

<div class="image-container">
<img src="bottom-image.jpg">
</div>

</div>

</body>
</html>
